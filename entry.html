<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tegel & Hatt</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #a5a6f6;
      --black: #111;
      --orange: #fd804b;
      --bg: #fafaf8;
      --muted: #999;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--black);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
    }

    .logo {
      position: fixed;
      top: 32px; left: 48px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .inner { max-width: 560px; width: 100%; }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 6vw, 4.5rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 48px;
      letter-spacing: -0.01em;
    }

    .cards { display: flex; flex-direction: column; gap: 12px; }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid #e8e8e4;
      border-radius: 10px;
      padding: 28px 32px;
      text-decoration: none;
      color: var(--black);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: var(--purple);
      box-shadow: 0 2px 20px rgba(165,166,246,0.12);
    }

    .card-body {}

    .card-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--purple);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      line-height: 1.2;
    }

    .arrow {
      font-size: 1.1rem;
      color: #ccc;
      flex-shrink: 0;
      margin-left: 24px;
      transition: color 0.2s, transform 0.2s;
    }

    .card:hover .arrow {
      color: var(--orange);
      transform: translateX(4px);
    }

    @media (max-width: 600px) {
      body { padding: 70px 24px 40px; }
      .logo { left: 24px; }
      h1 { font-size: 2.75rem; margin-bottom: 36px; }
      .card { padding: 22px 24px; }
    }
  </style>
</head>
<body>

  <div class="logo">Tegel & Hatt</div>

  <div class="inner">
    <h1>Vad kan vi göra för dig?</h1>

    <div class="cards">
      <a class="card" href="brief.html">
        <div class="card-body">
          <div class="card-label">Vi har inte pratat ännu</div>
          <h2>Jag vill komma i kontakt</h2>
        </div>
        <span class="arrow">→</span>
      </a>

      <a class="card" href="admin.html">
        <div class="card-body">
          <div class="card-label">Vi har redan pratat</div>
          <h2>Vi har skickat dig ett formulär</h2>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>
  </div>

</body>
</html>
